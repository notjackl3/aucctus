<!doctype html>
<html lang="en" class="light">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="mask-icon" href="images/icon-32x32.png" color="#ffffff" />
  <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon-180x180.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/images/apple-touch-icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="60x60" href="/images/apple-touch-icon-60x60.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json" />

  <!-- Preload critical images -->
  <link rel="preload" as="image" href="/src/app/assets/img/ai-explorations-background.png" />
  <link rel="preload" as="image" href="/src/app/assets/img/aucctus-incubation-card-1.png" />
  <link rel="preload" as="image" href="/src/app/assets/img/aucctus-incubation-card-2.png" />
  <link rel="preload" as="image" href="/src/app/assets/img/ready-to-generate-gradient.png" />

  <!-- Preload generating animation video -->
  <link rel="preload" as="video" href="/src/app/assets/img/generating-animated.webm" type="video/webm" />

  <!-- Browser-specific video preloading -->
  <script>
    (function () {
      var isSafari = /^((?!chrome|android).)*safari/i.test(
        navigator.userAgent,
      );

      var preloadLink = document.createElement('link');
      preloadLink.rel = 'preload';
      preloadLink.as = 'video';

      if (isSafari) {
        // Preload MP4 for Safari
        preloadLink.href = '/src/app/assets/img/generating-animated.mp4';
        preloadLink.type = 'video/mp4';
      } else {
        // Preload WebM for other browsers
        preloadLink.href = '/src/app/assets/img/generating-animated.webm';
        preloadLink.type = 'video/webm';
      }

      document.head.appendChild(preloadLink);
    })();
  </script>

  <!-- Preload logo animation keyframes (frames 001-183) -->
  <script>
    (function () {
      var basePath = '/animation-keyframes/logo-200/2500x2500Aucctus_Logo_Animation_INTRO_';
      for (var i = 1; i <= 183; i++) {
        var img = new Image();
        var frameNum = String(i).padStart(5, '0');
        img.src = basePath + frameNum + '.png';
      }
    })();
  </script>

  <!-- Hotjar Tracking -->
  <script>
    const hotjarId = `%VITE_HOTJAR_ID%`;
    if (hotjarId && !hotjarId.includes('VITE_HOTJAR_ID')) {
      (function (h, o, t, j, a, r) {
        h.hj =
          h.hj ||
          function () {
            (h.hj.q = h.hj.q || []).push(arguments);
          };
        h._hjSettings = { hjid: '%VITE_HOTJAR_ID%', hjsv: 6 };
        a = o.getElementsByTagName('head')[0];
        r = o.createElement('script');
        r.async = 1;
        r.src = t + h._hjSettings.hjid + j + h._hjSettings.hjsv;
        a.appendChild(r);
      })(window, document, 'https://static.hotjar.com/c/hotjar-', '.js?sv=');
    }
  </script>

  <title>Aucctus</title>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
