name: S3/CloudFront CI/CD

on:
  push:
    branches: [develop]

env:
  VITE_AUCCTUS_BASE_RESOURCE_URL: https://resource.staging.aucctus.com
  VITE_AUCCTUS_BASE_FAST_URL: https://fast.staging.aucctus.com
  VITE_SECRET_KEY: ${{ secrets.VITE_SECRET_KEY }}

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    environment: staging
    name: Build and Deploy Job
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Set up Node
        uses: actions/setup-node@v4.0.2
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      # upload all static assets w/ cache control (dist/** is an artifact from the previous step)
      - name: Deploy assets to S3
        run: aws s3 sync ./build/ s3://aucctus-staging-bucket --cache-control 'public,max-age=31536000,immutable'
      # overwrite index file with correct TTLs so latest changes are reflected immediately
      - name: Deploy index to S3
        run: aws s3 cp ./build/index.html s3://aucctus-staging-bucket --cache-control 'public,max-age=60'
