name: Pull Request Build and Test

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Ensures all branches are fetched

      - name: Set up Node.js (Example)
        uses: actions/setup-node@v3
        with:
          node-version: '20' # Specify your node version here

      - name: Install Dependencies
        run: npm install # or yarn install, depending on your project

      - name: Run Build
        run: npm run build # Replace with your build command

      - name: Run Tests
        run: npm run test --if-present # Replace with your test command
